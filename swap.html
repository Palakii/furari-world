<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furari World — Swap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .jp {
            font-family: 'Noto Serif JP', serif;
        }

        #toast {
            transition: transform 0.3s, opacity 0.3s;
            transform: translateY(80px);
            opacity: 0;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .spin {
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .token-btn {
            transition: all 0.2s;
        }

        .token-btn.active {
            border-color: #6366f1 !important;
            background: rgba(99, 102, 241, 0.15);
            color: white;
        }
    </style>
</head>

<body class="bg-[#0B0F1A] text-white min-h-screen overflow-x-hidden">

    <div id="toast"
        class="fixed bottom-6 right-6 z-50 bg-[#1a2236] border border-white/10 rounded-xl px-5 py-3 text-sm max-w-xs pointer-events-none">
    </div>

    <!-- NAVBAR -->
    <nav class="relative z-10 flex justify-between items-center px-8 py-5 border-b border-white/5">
        <div class="flex items-center gap-3">
            <span class="jp text-red-500 text-sm tracking-widest">弧</span>
            <h1 class="text-lg font-bold tracking-[4px]">FURARI WORLD</h1>
        </div>
        <div class="flex items-center gap-4">
            <a href="index.html"
                class="text-xs text-gray-500 hover:text-white transition-colors tracking-widest">CARDS</a>
            <a href="swap.html"
                class="text-xs text-indigo-400 tracking-widest border-b border-indigo-400 pb-0.5">SWAP</a>
            <div id="balanceChips" class="hidden flex items-center gap-2 text-[11px]">
                <span class="text-emerald-400 border border-emerald-400/30 rounded-full px-3 py-1" id="usdcBal">USDC:
                    —</span>
                <span class="text-blue-400 border border-blue-400/30 rounded-full px-3 py-1" id="eurcBal">EURC: —</span>
            </div>
            <div class="relative">
                <button id="btnConnect" onclick="handleWalletBtn()"
                    class="px-5 py-2 rounded-lg border border-red-500/50 text-red-400 text-sm font-semibold hover:bg-red-500/10 transition-all">
                    Connect Wallet
                </button>
                <!-- Dropdown -->
                <div id="walletDropdown"
                    class="hidden absolute right-0 top-12 bg-[#1a2236] border border-white/10 rounded-xl overflow-hidden w-48 z-50 shadow-xl">
                    <button onclick="copyAddress()"
                        class="w-full px-4 py-3 text-left text-sm text-gray-300 hover:bg-white/5 transition-colors flex items-center gap-2">
                        <span>📋</span> Copy Address
                    </button>
                    <button onclick="disconnect()"
                        class="w-full px-4 py-3 text-left text-sm text-red-400 hover:bg-red-500/10 transition-colors flex items-center gap-2">
                        <span>🔌</span> Disconnect
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="relative z-10 text-center pt-16 pb-10 px-4">
        <p class="jp text-indigo-400 text-[11px] tracking-[6px] mb-4">スワップ</p>
        <h2 class="text-4xl font-extrabold mb-3">Swap Tokens</h2>
        <p class="text-gray-500 text-sm">Exchange USDC and EURC on Arc Testnet</p>
    </section>

    <!-- SWAP CARD -->
    <section class="relative z-10 px-4 pb-24 flex justify-center">
        <div class="w-full max-w-md space-y-4">
            <div class="bg-[#111827] rounded-3xl p-6 border border-white/8 space-y-4">

                <!-- Direction -->
                <div class="flex gap-3">
                    <button id="btn-usdc-eurc" onclick="setDirection('usdc_to_eurc')"
                        class="token-btn active flex-1 py-2.5 rounded-xl border border-white/10 text-sm font-semibold text-gray-400">
                        USDC → EURC
                    </button>
                    <button id="btn-eurc-usdc" onclick="setDirection('eurc_to_usdc')"
                        class="token-btn flex-1 py-2.5 rounded-xl border border-white/10 text-sm font-semibold text-gray-400">
                        EURC → USDC
                    </button>
                </div>

                <!-- From -->
                <div class="bg-[#0d1422] rounded-2xl p-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs text-gray-500 tracking-wider">FROM</span>
                        <span class="text-xs text-gray-500" id="fromLabel">USDC</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-2xl" id="fromIcon">💵</span>
                        <input id="amountIn" type="number" placeholder="0.00" min="0.01" step="0.01"
                            class="flex-1 bg-transparent text-2xl font-bold outline-none text-white placeholder-gray-700" />
                        <span class="text-sm font-bold text-gray-400" id="fromToken">USDC</span>
                    </div>
                </div>

                <!-- Arrow -->
                <div class="text-center text-gray-600 text-xl">↓</div>

                <!-- To -->
                <div class="bg-[#0d1422] rounded-2xl p-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs text-gray-500 tracking-wider">TO (estimated)</span>
                        <span class="text-xs text-gray-500" id="toLabel">EURC</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-2xl" id="toIcon">💶</span>
                        <div class="flex-1 text-2xl font-bold text-gray-500" id="toAmount">~</div>
                        <span class="text-sm font-bold text-gray-400" id="toToken">EURC</span>
                    </div>
                </div>

                <!-- Rate -->
                <div class="flex justify-between text-xs text-gray-600 px-1">
                    <span>Rate</span>
                    <span id="rateInfo">~1 USDC = 1 EURC</span>
                </div>

                <!-- Swap button -->
                <button id="btnSwap" onclick="handleSwapClick()" disabled
                    class="w-full py-4 rounded-2xl bg-indigo-600 hover:bg-indigo-500 font-bold text-base tracking-wide transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                    Connect Wallet to Swap
                </button>

                <p class="text-center text-[11px] text-gray-600">
                    Powered by Arc App Kit
                </p>
            </div>

            <!-- TX Result -->
            <div id="txResult" class="hidden bg-[#0d1a14] rounded-2xl p-5 border border-emerald-500/20">
                <div class="flex items-center gap-2 text-emerald-400 font-semibold mb-3">
                    <span class="text-lg">✓</span><span>Swap Successful!</span>
                </div>
                <div class="space-y-2 text-xs">
                    <div class="flex justify-between">
                        <span class="text-gray-500">Swapped</span>
                        <span id="resultSummary" class="text-white font-semibold"></span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">Received</span>
                        <span id="resultAmountOut" class="text-emerald-400 font-semibold"></span>
                    </div>
                    <div class="border-t border-white/5 pt-2">
                        <div class="text-gray-500 mb-1">Transaction Hash</div>
                        <a id="txHashLink" href="#" target="_blank"
                            class="text-indigo-400 break-all hover:underline leading-relaxed text-[11px]"></a>
                    </div>
                </div>
            </div>

            <p class="text-center text-xs text-gray-700 tracking-wide">Powered by Arc App Kit</p>
        </div>
    </section>

    <script type="module">
        // ── Import App Kit จาก CDN (ESM) ────────────────────────────────────────────
        import { AppKit } from 'https://esm.sh/@circle-fin/app-kit@latest';
        import { createViemAdapterFromProvider } from 'https://esm.sh/@circle-fin/adapter-viem-v2@latest';

        // ── CONFIG ────────────────────────────────────────────────────────────────────
        const KIT_KEY = '5fa86dbdd8f57394cd324e300cf3c8a3:0ad3f3b110ea73d64c1e9fd06ad2e5fc'; // ← ใส่ KIT_KEY จริง
        const ARC_CHAIN_ID = '5042002'; // 5042002 = Arc Testnet

        // USDC และ EURC contract บน Arc Testnet
        const TOKEN_CONTRACTS = {
            USDC: '0x3600000000000000000000000000000000000000',
            EURC: '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a',
        };

        // ERC20 balanceOf ABI (minimal)
        const ERC20_ABI_BALANCE = '0x70a08231';

        // ── STATE ─────────────────────────────────────────────────────────────────────
        let wallet = null;
        let kit = null;
        let adapter = null;
        let direction = 'usdc_to_eurc';

        // ── WALLET ────────────────────────────────────────────────────────────────────
        window.handleWalletBtn = function () {
            if (wallet) {
                toggleDropdown();
            } else {
                connectWallet();
            }
        };

        async function connectWallet() {
            if (!window.ethereum) { showToast('กรุณาติดตั้ง MetaMask ก่อน', true); return; }

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                wallet = accounts[0];

                // Switch to Arc Testnet
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: ARC_CHAIN_ID }],
                    });
                } catch (e) {
                    if (e.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: ARC_CHAIN_ID,
                                chainName: 'Arc Testnet',
                                nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 },
                                rpcUrls: ['https://rpc.testnet.arc.network'],
                                blockExplorerUrls: ['https://testnet.arcscan.app'],
                            }]
                        });
                    }
                }

                // ── สร้าง adapter จาก MetaMask ของ user ตาม doc ────────────────────────
                adapter = await createViemAdapterFromProvider({
                    provider: window.ethereum,
                });

                kit = new AppKit();

                setWalletUI(wallet);
                await fetchBalances();
                showToast('Wallet connected ✓');

            } catch (err) {
                console.error(err);
                showToast('Connection rejected', true);
            }
        }

        function setWalletUI(addr) {
            const btn = document.getElementById('btnConnect');
            btn.textContent = addr.slice(0, 6) + '…' + addr.slice(-4) + ' ▾';
            btn.className = 'px-5 py-2 rounded-lg border border-emerald-500/40 text-emerald-400 text-sm font-semibold hover:bg-emerald-500/10 transition-all';

            document.getElementById('balanceChips').classList.remove('hidden');
            document.getElementById('btnSwap').textContent = 'Swap Now';
            document.getElementById('btnSwap').disabled = false;
        }

        // ── DISCONNECT ────────────────────────────────────────────────────────────────
        window.disconnect = function () {
            wallet = null;
            kit = null;
            adapter = null;

            const btn = document.getElementById('btnConnect');
            btn.textContent = 'Connect Wallet';
            btn.className = 'px-5 py-2 rounded-lg border border-red-500/50 text-red-400 text-sm font-semibold hover:bg-red-500/10 transition-all';

            document.getElementById('balanceChips').classList.add('hidden');
            document.getElementById('btnSwap').textContent = 'Connect Wallet to Swap';
            document.getElementById('btnSwap').disabled = true;
            document.getElementById('txResult').classList.add('hidden');
            document.getElementById('walletDropdown').classList.add('hidden');

            showToast('Disconnected');
        };

        // ── COPY ADDRESS ──────────────────────────────────────────────────────────────
        window.copyAddress = function () {
            if (!wallet) return;
            navigator.clipboard.writeText(wallet);
            document.getElementById('walletDropdown').classList.add('hidden');
            showToast('Address copied!');
        };

        // ── DROPDOWN ──────────────────────────────────────────────────────────────────
        window.toggleDropdown = function () {
            document.getElementById('walletDropdown').classList.toggle('hidden');
        };

        // ปิด dropdown ถ้าคลิกนอก
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('walletDropdown');
            const btn = document.getElementById('btnConnect');
            if (!dropdown.contains(e.target) && !btn.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });

        // ── FETCH BALANCES ────────────────────────────────────────────────────────────
        async function fetchBalances() {
            if (!wallet) return;
            try {
                const [usdc, eurc] = await Promise.all([
                    getTokenBalance(TOKEN_CONTRACTS.USDC, wallet),
                    getTokenBalance(TOKEN_CONTRACTS.EURC, wallet),
                ]);
                document.getElementById('usdcBal').textContent = `USDC: ${usdc}`;
                document.getElementById('eurcBal').textContent = `EURC: ${eurc}`;
            } catch (e) {
                console.error('Balance fetch error:', e);
            }
        }

        async function getTokenBalance(tokenAddr, userAddr) {
            // eth_call → ERC20 balanceOf(address)
            const data = ERC20_ABI_BALANCE + userAddr.replace('0x', '').padStart(64, '0');
            const result = await window.ethereum.request({
                method: 'eth_call',
                params: [{ to: tokenAddr, data }, 'latest']
            });
            // USDC/EURC = 6 decimals
            const raw = BigInt(result || '0x0');
            return (Number(raw) / 1e6).toFixed(2);
        }

        // ── AUTO-CONNECT ──────────────────────────────────────────────────────────────
        window.addEventListener('load', async () => {
            if (!window.ethereum) return;
            try {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    wallet = accounts[0];
                    adapter = await createViemAdapterFromProvider({ provider: window.ethereum });
                    kit = new AppKit();
                    setWalletUI(wallet);
                    await fetchBalances();
                }
            } catch (e) { }
        });

        // ── DIRECTION ─────────────────────────────────────────────────────────────────
        window.setDirection = function (dir) {
            direction = dir;
            const isUtoE = dir === 'usdc_to_eurc';
            document.getElementById('fromLabel').textContent = isUtoE ? 'USDC' : 'EURC';
            document.getElementById('toLabel').textContent = isUtoE ? 'EURC' : 'USDC';
            document.getElementById('fromToken').textContent = isUtoE ? 'USDC' : 'EURC';
            document.getElementById('toToken').textContent = isUtoE ? 'EURC' : 'USDC';
            document.getElementById('fromIcon').textContent = isUtoE ? '💵' : '💶';
            document.getElementById('toIcon').textContent = isUtoE ? '💶' : '💵';
            document.getElementById('rateInfo').textContent = isUtoE ? '~1 USDC = 1 EURC' : '~1 EURC = 1 USDC';
            document.getElementById('btn-usdc-eurc').classList.toggle('active', isUtoE);
            document.getElementById('btn-eurc-usdc').classList.toggle('active', !isUtoE);
            document.getElementById('toAmount').textContent = '~';
            document.getElementById('amountIn').value = '';
            document.getElementById('txResult').classList.add('hidden');
        };

        document.getElementById('amountIn').addEventListener('input', function () {
            const val = parseFloat(this.value);
            document.getElementById('toAmount').textContent = isNaN(val) ? '~' : '≈ ' + val.toFixed(2);
        });

        // ── SWAP ──────────────────────────────────────────────────────────────────────
        window.handleSwapClick = function () {
            if (!wallet) { showToast('กรุณา Connect Wallet ก่อน', true); return; }
            doSwap();
        };

        async function doSwap() {
            const amountIn = parseFloat(document.getElementById('amountIn').value);
            if (!amountIn || amountIn <= 0) {
                showToast('กรุณาใส่จำนวนที่ต้องการ swap', true);
                return;
            }

            const btn = document.getElementById('btnSwap');
            btn.disabled = true;
            btn.innerHTML = '<span class="spin">⟳</span> Swapping...';
            document.getElementById('txResult').classList.add('hidden');

            try {
                const tokenIn = direction === 'usdc_to_eurc' ? 'USDC' : 'EURC';
                const tokenOut = direction === 'usdc_to_eurc' ? 'EURC' : 'USDC';

                // ── ตาม doc: ใช้ adapter จาก window.ethereum (MetaMask ของ user) ────────
                const result = await kit.swap({
                    from: { adapter, chain: 'Arc_Testnet' },
                    tokenIn,
                    tokenOut,
                    amountIn: String(amountIn),
                    config: { kitKey: KIT_KEY },
                });

                console.log('Swap result:', result);

                const txHash = result?.txHash || result?.transactionHash || result?.hash || '';
                const amountOut = result?.amountOut || '';
                const explorerUrl = result?.explorerUrl || (txHash ? `https://testnet.arcscan.app/tx/${txHash}` : '#');

                document.getElementById('txResult').classList.remove('hidden');
                document.getElementById('resultSummary').textContent = `${amountIn} ${tokenIn} → ${tokenOut}`;
                document.getElementById('resultAmountOut').textContent = amountOut ? `${amountOut} ${tokenOut}` : `~ ${tokenOut}`;
                document.getElementById('txHashLink').textContent = txHash || 'View on Explorer';
                document.getElementById('txHashLink').href = explorerUrl;

                // อัพเดท balance หลัง swap
                await fetchBalances();
                showToast(`✓ Swapped ${amountIn} ${tokenIn} → ${tokenOut}`);

            } catch (err) {
                console.error('Swap error:', err);
                showToast(err.message || 'Swap failed', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Swap Now';
            }
        }

        // ── TOAST ─────────────────────────────────────────────────────────────────────
        let toastTimer;
        window.showToast = function (msg, err = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.style.color = err ? '#f87171' : '#34d399';
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
        };
    </script>
</body>

</html>
